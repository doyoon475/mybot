name: Monthly Quant Data Update

on:
  schedule:
    - cron: '0 0 1 * *'  # 매월 1일 자정 실행
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run ETL Pipeline
      run: |
        python quant_etl.py

    - name: Commit and Push DB
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data_cache/quant_history.db
        
        # [주의] DB 파일 크기가 100MB를 초과할 경우 GitHub의 파일 용량 제한에 걸려 Push가 실패할 수 있습니다.
        # 100MB 초과가 예상될 경우 Git LFS(Large File Storage)를 적용해야 합니다.
        # 적용 방법:
        # git lfs install
        # git lfs track "data_cache/quant_history.db"
        # git add .gitattributes
        
        git commit -m "Auto-update: Monthly quant data synchronization [skip ci]" || echo "No changes to commit"
        git push
