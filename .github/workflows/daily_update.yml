name: Daily Quant Data Update (Git Bot)

# 💡 시니어의 조언: 
# 현재 SQLite DB 파일(quant_history.db)은 용량이 500MB를 넘으므로 Github에 올릴 수 없어 .gitignore로 막아둔 상태입니다.
# 따라서 GitHub Actions에서 이 봇을 돌리면 "새로운 가상 컴퓨터"에서 돌기 때문에 기존 DB가 없습니다.
# 
# [완벽한 자동화를 위한 2가지 선택지]
# 1. (추천) 무료 클라우드 DB(Supabase, PostgreSQL 등)로 DB를 마이그레이션하여 GitHub Actions가 클라우드 DB에 직접 데이터를 쏘게 만듭니다.
# 2. GitHub Actions를 쓰지 않고, 윈도우의 '작업 스케줄러(Task Scheduler)'를 통해 내 컴퓨터에서 매일 자정에 `python daily_updater.py`가 자동으로 돌도록 설정합니다.

on:
  schedule:
    # 매일 한국 시간 기준 밤 11시 (UTC 14:00)에 자동 실행
    - cron: '0 14 * * *'
  workflow_dispatch: # 수동으로 버튼을 눌러서 실행할 수 있는 옵션

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 3.12 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 3. 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy plotly streamlit requests google-generativeai python-dotenv FinanceDataReader OpenDartReader selenium

    - name: 4. 자동 업데이트 파이프라인 가동 (DART & 주가)
      env:
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python daily_updater.py
        
    # 만약 DB를 클라우드(PostgreSQL 등)로 이전한다면 이 단계에서 파이프라인 종료.
    # 파일(CSV 등)을 GitHub에 커밋해서 남기려면 아래 단계를 사용합니다.
    # - name: 5. 변경된 데이터 깃허브에 자동 커밋 (Git Bot)
