name: Daily Quant Data Accumulate

# 과거 DB 위에 매일 퀀트킹 첨부 + 주가를 누적합니다.
# DB(~450MB)는 git에 넣지 않고 Release(quant-db-latest)에 zstd로 보관합니다.
#
# --- 최초 1회 (로컬) ---
#   pip install zstandard
#   gh auth login
#   python publish_db_release.py
#
# --- GitHub Secrets ---
#   QUANTKING_EMAIL + QUANTKING_PASSWORD  (또는 QUANTKING_TOKEN)
#   DART_API_KEY   ← 자체 팩터 빌드에 필수 (opendart.fss.or.kr)
#   GEMINI_API_KEY (선택)
#   요약 메일(선택): SMTP_USER, SMTP_PASSWORD(Gmail 앱비번), NOTIFY_TO

on:
  schedule:
    # 평일 한국시간 18:30 ≈ UTC 09:30 (장 마감 후)
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  daily-accumulate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download latest DB from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data_cache quant_raw_data
          if gh release view quant-db-latest >/dev/null 2>&1; then
            gh release download quant-db-latest -p 'quant_history.db.zst' -D data_cache --clobber
            python db_snapshot.py decompress
          else
            echo "::error::Release 'quant-db-latest' 없음. 로컬에서 python publish_db_release.py 실행 필요"
            exit 1
          fi

      - name: Run daily accumulate pipeline
        env:
          QUANTKING_TOKEN: ${{ secrets.QUANTKING_TOKEN }}
          QUANTKING_EMAIL: ${{ secrets.QUANTKING_EMAIL }}
          QUANTKING_PASSWORD: ${{ secrets.QUANTKING_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUANTKING_PAGES: '2'
          PRICE_LOOKBACK_DAYS: '14'
          # both = 퀀트킹 + 자체팩터 병행 (전환기). 구독 종료 후 self 로 변경
          FACTOR_MODE: 'both'
          # 전체 종목 DART는 수 시간 소요 → 일일에는 모멘텀 위주, 주말에 전체
          SKIP_DART: '1'
        run: python daily_updater.py

      - name: Compress & upload DB to Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          # 이중 게이트: 빈 달 차단 + 정상 달(PER~50% 또는 PBR~80%) 허용
          GATE_MIN_ROWS: '500'
          GATE_MIN_PER_COVERAGE: '0.50'
          GATE_MIN_PBR_COVERAGE: '0.80'
          GATE_DISASTER_PER: '0.10'
          GATE_DISASTER_PBR: '0.20'
          GATE_MAX_DROP_VS_PREV: '0.35'
        run: |
          python db_quality_gate.py
          python db_snapshot.py compress
          gh release upload quant-db-latest data_cache/quant_history.db.zst --clobber
          # 날짜 백업 태그(롤백용). 동일 날짜 재실행 시 자산 실패해도 latest는 유지.
          DAY_TAG="quant-db-$(date -u +%Y-%m-%d)"
          if gh release view "$DAY_TAG" >/dev/null 2>&1; then
            gh release upload "$DAY_TAG" data_cache/quant_history.db.zst --clobber || true
          else
            gh release create "$DAY_TAG" data_cache/quant_history.db.zst \
              --title "Quant History DB ($DAY_TAG)" \
              --notes "일일 스냅샷 백업 (게이트 통과분)" || true
          fi

      - name: Upload raw artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-raw-files
          path: quant_raw_data/
          retention-days: 7
          if-no-files-found: ignore

      - name: Email daily summary
        if: always()
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          JOB_STATUS: ${{ job.status }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_daily_summary.py
