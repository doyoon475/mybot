# 단기 Streamlit 배포 (#8)
# 사용: docker compose up --build
# 사전: data_cache/quant_history.db 준비 (python pull_db_release.py)
services:
  quant-lab:
    build: .
    image: quant-lab-v2:latest
    ports:
      - "8501:8501"
    # .env 가 있으면 API 키가 주입됩니다 (없어도 기동은 가능하도록 문서 참고)
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    volumes:
      # DB·회원·포트 잠금 등 영속화
      - ./data_cache:/app/data_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
